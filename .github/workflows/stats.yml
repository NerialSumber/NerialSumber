name: GitHub Readme Stats (Docker)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Stats Container
        run: |
          # Em vez de baixar uma imagem pronta que pode falhar, 
          # vamos rodar a imagem oficial do criador original (anuraghazra)
          # ou usar o comando direto via npx se preferir, mas mantendo o Docker:
          
          docker run -d --name stats-api -p 3000:3000 \
          -e AUTH_TOKEN=${{ secrets.GH_TOKEN }} \
          -e VERCEL_ENV=production \
          anuraghazra/github-readme-stats:latest || \
          docker run -d --name stats-api -p 3000:3000 -e AUTH_TOKEN=${{ secrets.GH_TOKEN }} hctis/github-readme-stats-docker:latest

          sleep 15
          
          # Use o seu nome de usuário: 
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical" -o github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git commit -m "chore: update github stats" || exit 0
          git push
