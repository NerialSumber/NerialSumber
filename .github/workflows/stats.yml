name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Mantendo a v22 que o projeto pediu

      - name: Baixar e Rodar Servidor (Debug Blindado)
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          echo "📦 Instalando dependências..."
          # REMOVIDO: --omit=dev (causou a falha dos 27 pacotes)
          # MANTIDO: --ignore-scripts (evita o erro do husky)
          npm install --no-audit --ignore-scripts
          
          echo "🚀 Iniciando servidor..."
          export PORT=3000
          # Inicia e joga o log para server.log
          node src/index.js > server.log 2>&1 &
          
          echo "⏳ Aguardando porta 3000 abrir..."
          # Se falhar após 30s, mostra o log do erro IMEDIATAMENTE e encerra
          npx wait-on http://localhost:3000 --timeout 30000 || (echo "❌ FALHA AO INICIAR SERVIDOR! LOG ABAIXO:" && cat server.log && exit 1)
          
          echo "✅ Servidor Online!"

      - name: Gerar Imagem SVG
        run: |
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas" || echo "Sem mudanças"
            git push
          else
            echo "❌ Erro: Arquivo vazio."
            exit 1
          fi
