name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniciar Servidor e Aguardar
        run: |
          # 1. Usamos a imagem estável do utkuozdemir
          # 2. Mapeamos 3000:3000 (A porta CORRETA)
          # 3. Passamos o PAT_1 que é obrigatório
          docker run -d --name stats-api -p 3000:3000 \
            -e PAT_1="${{ secrets.GH_TOKEN }}" \
            ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "⏳ Aguardando 60 segundos para o container baixar dependências e iniciar..."
          sleep 60
          
          # DEBUG: Mostra os logs para confirmar que a porta 3000 abriu
          echo "--- LOGS DO CONTAINER ---"
          docker logs stats-api
          echo "-------------------------"

      - name: Gerar Imagem SVG
        run: |
          # Agora batemos na porta 3000 correta
          curl -v "http://localhost:3000/api?username=gabriel-oliveira&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg

      - name: Verificar e Commitar
        run: |
          if [ -s github-stats.svg ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas" || exit 0
            git push
          else
            echo "❌ Erro: O arquivo SVG não foi gerado (tamanho 0)."
            exit 1
          fi
