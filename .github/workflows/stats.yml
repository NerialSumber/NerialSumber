name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Atualizado para v22 conforme exigido pelo log

      - name: Baixar e Rodar Servidor
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          # AQUI ESTÁ A CORREÇÃO MÁGICA:
          # --ignore-scripts: Impede que o 'husky' tente rodar e falhe o processo
          # --no-audit: Impede que ele perca tempo verificando segurança
          npm install --no-audit --omit=dev --ignore-scripts
          
          # Inicia o servidor
          export PORT=3000
          node src/index.js > server.log 2>&1 &
          
          echo "Aguardando servidor iniciar..."
          npx wait-on http://localhost:3000 --timeout 60000
          echo "✅ Servidor online!"

      - name: Gerar Imagem SVG
        run: |
          # Gera o SVG
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          # Move para a raiz
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas do perfil" || exit 0
            git push
          else
            echo "❌ Erro: O arquivo gerado está vazio. Logs do servidor:"
            cat github-readme-stats/server.log
            exit 1
          fi
