name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniciar Servidor de Stats (Versão Self-Hosted)
        run: |
          # Usamos a imagem do 'utkuozdemir', que é feita especificamente para rodar fora da Vercel
          # Mapeamos a porta 9000 do container para a 3000 do runner
          docker run -d --name stats-api -p 3000:9000 \
            -e PAT_1="${{ secrets.GH_TOKEN }}" \
            ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "Aguardando o container iniciar..."
          sleep 15
          
          # Verificação rápida se o servidor subiu
          curl -I http://localhost:3000/api || echo "Aviso: Servidor demorou a responder, tentando gerar a imagem mesmo assim..."

      - name: Gerar Imagem SVG
        run: |
          # Gera o SVG. Note que adicionei '&count_private=true' para contar seus commits privados
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          # Move para a pasta correta (se necessário) ou mantém na raiz
          # O checkout já está na raiz, então o arquivo já está no lugar certo

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg
          # O '|| exit 0' impede que o workflow falhe se não houver mudanças nas estatísticas
          git commit -m "docs: atualiza estatísticas do perfil" || exit 0
          git push
