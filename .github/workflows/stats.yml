name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências e Ferramentas
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git stats-generator
          cd stats-generator
          npm install
          npm install -g wait-on

      - name: Iniciar Servidor (Debug Mode)
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          cd stats-generator
          
          # Verifica se o token existe (sem mostrar o valor)
          if [ -z "$PAT_1" ]; then
            echo "ERRO CRÍTICO: O segredo GH_TOKEN não foi encontrado ou está vazio!"
            exit 1
          fi

          export PORT=3000
          # Inicia o servidor e joga o log para um arquivo para lermos depois se der erro
          npm start > server.log 2>&1 &
          
          echo "Servidor iniciando... Aguardando porta 3000..."
          
          # Espera até 60 segundos pela porta 3000
          npx wait-on tcp:3000 --timeout 60000 || (cat server.log && exit 1)
          
          echo "Servidor online!"

      - name: Gerar Imagem SVG
        run: |
          # Gera o SVG
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          # Move para a pasta principal
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git commit -m "docs: atualiza estatísticas" || echo "Sem mudanças"
          git push
