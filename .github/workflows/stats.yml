name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências e Express
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          npm pkg delete scripts.prepare
          npm install --no-audit --no-fund --ignore-scripts
          npm install express

      - name: Criar e Iniciar Servidor (Wrapper)
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          cd github-readme-stats
          
          cat <<EOF > local-server.js
          import express from 'express';
          import handler from './api/index.js';
          import langsHandler from './api/top-langs.js'; 

          const app = express();
          const port = 3000;

          // Rota para Stats Gerais
          app.get('/api', async (req, res) => {
            try { await handler(req, res); } 
            catch (err) { console.error(err); res.status(500).send('Erro'); }
          });

          // NOVA ROTA: Top Languages
          app.get('/api/top-langs', async (req, res) => {
            try { await langsHandler(req, res); } 
            catch (err) { console.error(err); res.status(500).send('Erro'); }
          });

          app.listen(port, () => {
            console.log('✅ Servidor rodando na porta ' + port);
          });
          EOF

          nohup node local-server.js > server.log 2>&1 &
          PID=$!
          sleep 10
          if ! kill -0 $PID 2>/dev/null; then
            cat server.log
            exit 1
          fi

      - name: Gerar Imagens SVG
        run: |
          echo "📸 Baixando Stats..."
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true" -o github-stats.svg
          
          echo "📸 Baixando Linguagens..."
          # Aqui pedimos as linguagens. Usei layout=compact que economiza espaço
          curl -v "http://localhost:3000/api/top-langs?username=NerialSumber&layout=compact&theme=tokyonight&hide_border=true" -o top-langs.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona todos os SVGs gerados
          git add *.svg
          
          # Commita se houver mudanças
          git commit -m "docs: atualiza stats e linguagens" || echo "Sem mudanças"
          git push
