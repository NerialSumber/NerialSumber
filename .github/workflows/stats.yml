name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente para testar

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniciar Servidor (Modo Rede Host)
        run: |
          # Usamos --network host para eliminar problemas de porta
          # A imagem utkuozdemir roda na porta 80 internamente
          docker run -d --network host \
            -e PAT_1="${{ secrets.GH_TOKEN }}" \
            ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "Aguardando servidor subir (20s)..."
          sleep 20
          
          # Debug: Verificar se tem algo rodando na porta 80
          sudo netstat -tulpn | grep :80 || echo "Nada na porta 80 ainda"

      - name: Gerar Imagem SVG
        run: |
          # Com network host, acessamos direto no localhost:80
          curl -v "http://localhost:80/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg
          git commit -m "docs: atualiza estatísticas" || exit 0
          git push
