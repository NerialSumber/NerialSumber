name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniciar Servidor (Porta Corrigida)
        run: |
          # Correção: Mapeando a porta 3000 do GitHub Actions para a porta 80 do Container
          docker run -d --name stats-api -p 3000:80 \
            -e PAT_1="${{ secrets.GH_TOKEN }}" \
            ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "Aguardando servidor subir (15s)..."
          sleep 15
          
          # Debug: Se falhar, vamos ver o que aconteceu dentro do container
          docker ps
          docker logs stats-api

      - name: Gerar Imagem SVG
        run: |
          # Tenta gerar a imagem. Se falhar, mostra o erro no console.
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
      - name: Verificar se arquivo foi criado
        run: |
          if [ -s github-stats.svg ]; then
            echo "Sucesso! Imagem gerada."
          else
            echo "Erro: O arquivo está vazio ou não foi criado."
            exit 1
          fi

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg
          git commit -m "docs: atualiza estatísticas" || echo "Sem mudanças para commitar"
          git push
