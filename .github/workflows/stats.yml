name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Baixar e Rodar Servidor
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          # 1. Clona o repositório
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          # 2. Instalação Limpa
          echo "📦 Instalando dependências..."
          npm install --no-audit --ignore-scripts --no-fund
          
          # 3. Inicia o servidor em Background
          echo "🚀 Iniciando servidor..."
          export PORT=3000
          node src/index.js > server.log 2>&1 &
          PID=$!
          
          # 4. Loop de Espera (Curl) - Tenta por 2 minutos
          echo "⏳ Aguardando servidor responder na porta 3000..."
          
          COUNT=0
          MAX_RETRIES=24 # 24 * 5s = 120 segundos (2 minutos)
          SUCCESS=0
          
          while [ $COUNT -lt $MAX_RETRIES ]; do
            if curl -s http://localhost:3000/api > /dev/null; then
              echo "✅ Servidor respondeu!"
              SUCCESS=1
              break
            fi
            
            # Se o processo do node morreu, para agora
            if ! kill -0 $PID 2>/dev/null; then
              echo "❌ O processo do servidor morreu inesperadamente."
              break
            fi
            
            echo "Attempt $(($COUNT+1))/$MAX_RETRIES: Aguardando..."
            sleep 5
            COUNT=$(($COUNT+1))
          done
          
          # Debug final se falhar
          if [ $SUCCESS -eq 0 ]; then
            echo "❌ ERRO: Timeout ou Falha do Servidor. Logs:"
            cat server.log
            exit 1
          fi

      - name: Gerar Imagem SVG
        run: |
          echo "📸 Gerando imagem para NerialSumber..."
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas de NerialSumber" || echo "Sem mudanças"
            git push
          else
            echo "❌ Erro: Arquivo vazio."
            exit 1
          fi
