name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências e Express
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          npm pkg delete scripts.prepare
          npm install --no-audit --no-fund --ignore-scripts
          npm install express

      - name: Criar e Iniciar Servidor (Wrapper Completo)
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          cd github-readme-stats
          
          # CRIA O SERVIDOR COM SUPORTE A WAKATIME
          cat <<EOF > local-server.js
          import express from 'express';
          import handler from './api/index.js';
          import langsHandler from './api/top-langs.js';
          import wakatimeHandler from './api/wakatime.js'; // Adicionado WakaTime

          const app = express();
          const port = 3000;

          // Rota Stats Gerais
          app.get('/api', async (req, res) => {
            try { await handler(req, res); } catch (err) { console.error(err); res.status(500).send('Erro'); }
          });

          // Rota Linguagens
          app.get('/api/top-langs', async (req, res) => {
            try { await langsHandler(req, res); } catch (err) { console.error(err); res.status(500).send('Erro'); }
          });

          // Rota WakaTime
          app.get('/api/wakatime', async (req, res) => {
            try { await wakatimeHandler(req, res); } catch (err) { console.error(err); res.status(500).send('Erro'); }
          });

          app.listen(port, () => {
            console.log('✅ Servidor wrapper rodando na porta ' + port);
          });
          EOF

          # INICIA O SERVIDOR
          echo "🚀 Iniciando servidor..."
          nohup node local-server.js > server.log 2>&1 &
          PID=$!
          
          echo "⏳ Aguardando 10 segundos..."
          sleep 10
          
          if ! kill -0 $PID 2>/dev/null; then
            echo "❌ O servidor morreu! Logs:"
            cat server.log
            exit 1
          fi

      - name: Gerar Imagens SVG
        run: |
          echo "📸 Baixando Stats..."
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_rank=true" -o github-stats.svg
          
          echo "📸 Baixando Linguagens..."
          curl -v "http://localhost:3000/api/top-langs?username=NerialSumber&layout=compact&theme=tokyonight&hide_border=true" -o top-langs.svg

          echo "📸 Baixando WakaTime..."
          # Aqui usamos o tema 'tokyonight' que você pediu
          curl -v "http://localhost:3000/api/wakatime?username=NerialSumber&layout=compact&theme=tokyonight" -o wakatime.svg

      - name: Trocar imagem por época do ano
        run: |
          # Pega o mês atual (01 a 12)
          MES=$(date +%m)
          
          echo "Mês atual: $MES"
          
          # Lógica para escolher a imagem
          if [ "$MES" == "02" ] || [ "$MES" == "03" ]; then
            echo "📽️ Absolute Cinema!!"
            # Coloque aqui o nome da imagem original do cinema
            cp assets/cinephiloctocat.png assets/filmtocat.png
            
          elif [ "$MES" == "08" ]; then
            echo "🎁 Meu Aniversarioo !!"
            cp assets/hulalooptocat.gif assets/filmtocat.png
            
          elif [ "$MES" == "10" ]; then
            echo "🎃 Mês do Halloween!"
            cp assets/mummytocat.gif assets/filmtocat.png
            
          elif [ "$MES" == "12" ]; then
            echo "🎄 Mês do Natal!"
            cp assets/grinchtocat.gif assets/filmtocat.png
            
          else
            echo "🐱 Mês normal, usando imagem padrão."
            cp assets/octocat-1773343804132.png assets/filmtocat.png
          fi
          
      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona todos os SVGs e também a imagem do filmtocat
          git add *.svg assets/filmtocat.png
          
          git commit -m "docs: atualiza estatísticas e imagem sazonal" || echo "Sem mudanças"
          git push
