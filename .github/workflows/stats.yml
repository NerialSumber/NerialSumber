name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniciar Servidor e Aguardar (Smart Wait)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Verifica se o token existe antes de começar
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ ERRO: O Secret GH_TOKEN está vazio ou não foi configurado!"
            exit 1
          fi

          echo "🚀 Iniciando Container..."
          # Roda o container na porta 3000
          docker run -d --name stats-api -p 3000:3000 \
            -e PAT_1="$GH_TOKEN" \
            ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "⏳ Aguardando o servidor ficar pronto (pode demorar uns minutos)..."
          
          # Loop Inteligente: Tenta conectar a cada 10s (Limite: 30 tentativas = 5 min)
          RETRIES=0
          MAX_RETRIES=30
          until curl -s -f -o /dev/null "http://localhost:3000/api?username=NerialSumber"; do
            echo "Tentativa $RETRIES/$MAX_RETRIES: Servidor ainda indisponível... esperando 10s"
            sleep 10
            RETRIES=$((RETRIES+1))
            
            # Se atingir o limite, mostra os logs e falha
            if [ $RETRIES -ge $MAX_RETRIES ]; then
              echo "❌ ERRO: Timeout! O servidor não subiu após 5 minutos."
              echo "--- LOGS DO CONTAINER ---"
              docker logs stats-api
              exit 1
            fi
          done
          
          echo "✅ Servidor Online e Respondendo!"

      - name: Gerar Imagem SVG
        run: |
          # Agora temos certeza que o servidor está de pé
          curl "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas" || echo "Sem mudanças"
            git push
          else
            echo "⚠️ Aviso: Arquivo gerado está vazio."
            exit 1
          fi
