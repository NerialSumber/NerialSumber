name: GitHub Readme Stats (Docker)

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Stats Container
        run: |
          docker run -d --name stats-api -p 3000:3000 \
          -e PAT=${{ secrets.GH_TOKEN }} \
          fimsh/github-readme-stats-docker:latest
          
          # Aguarda o container subir
          sleep 10
          
          # Baixa a imagem gerada (substitua pelo seu usuário)
          curl "http://localhost:3000/api?NerialSumber&show_icons=true&theme=radical" -o github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git commit -m "chore: update github stats" || exit 0
          git push
