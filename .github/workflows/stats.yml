name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências e Express
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          echo "📦 Instalando dependências..."
          npm pkg delete scripts.prepare
          npm install --no-audit --no-fund --ignore-scripts
          
          echo "📦 Instalando Express (necessário para o wrapper)..."
          npm install express

      - name: Criar e Iniciar Servidor (Versão ESM)
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          cd github-readme-stats
          
          # CRIANDO O SERVIDOR COM SINTAXE MODERNA (IMPORT)
          # Isso corrige o erro "require is not defined"
          cat <<EOF > local-server.js
          import express from 'express';
          import handler from './api/index.js';

          const app = express();
          const port = 3000;

          app.get('/api', async (req, res) => {
            try {
              await handler(req, res);
            } catch (err) {
              console.error(err);
              res.status(500).send('Erro interno');
            }
          });

          app.listen(port, () => {
            console.log('✅ Servidor wrapper rodando na porta ' + port);
          });
          EOF

          # Inicia o servidor
          echo "🚀 Iniciando servidor wrapper..."
          nohup node local-server.js > server.log 2>&1 &
          PID=$!
          
          echo "⏳ Aguardando 10 segundos..."
          sleep 10
          
          # Verifica se está rodando
          if ! kill -0 $PID 2>/dev/null; then
            echo "❌ O servidor morreu! Logs:"
            cat server.log
            exit 1
          fi
          echo "Logs iniciais:"
          head -n 20 server.log

      - name: Gerar Imagem SVG
        run: |
          echo "📸 Baixando stats de NerialSumber..."
          
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas de NerialSumber" || echo "Sem mudanças"
            git push
            echo "✅ Sucesso!"
          else
            echo "❌ Erro: Arquivo vazio."
            cat github-readme-stats/server.log
            exit 1
          fi
