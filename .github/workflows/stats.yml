name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Voltando para v20 que é mais estável para esse projeto

      - name: Diagnóstico e Instalação
        env:
          MY_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 1. Verificação de Segurança do Token
          if [ -z "$MY_TOKEN" ]; then
            echo "🚨 ERRO CRÍTICO: O secret 'GH_TOKEN' está vazio ou não existe!"
            echo "Vá em Settings > Secrets and variables > Actions e crie o GH_TOKEN."
            exit 1
          else
            echo "✅ Token encontrado (Comprimento: ${#MY_TOKEN} caracteres)."
          fi

          # 2. Clone e Instalação
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          echo "📦 Instalando pacotes (Ignorando scripts chatos)..."
          npm install --no-audit --no-fund --ignore-scripts

      - name: Iniciar Servidor
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
        run: |
          cd github-readme-stats
          echo "🚀 Iniciando aplicação..."
          
          # Define a porta explicitamente
          export PORT=3000
          
          # Inicia em background usando nohup para não morrer quando o shell fechar
          # Redireciona TUDO para server.log sem buffer
          nohup npm start > server.log 2>&1 &
          PID=$!
          echo "Processo iniciado com PID: $PID"
          
          echo "⏳ Aguardando 15 segundos para inicialização..."
          sleep 15
          
          # Mostra o log inicial para sabermos se deu certo
          echo "--- LOG INICIAL DO SERVIDOR ---"
          cat server.log
          echo "-------------------------------"
          
          # Verifica se o processo ainda existe
          if ! kill -0 $PID 2>/dev/null; then
            echo "❌ O servidor morreu durante a inicialização!"
            exit 1
          fi

      - name: Gerar Imagem SVG
        run: |
          echo "📸 Solicitando imagem para: NerialSumber"
          
          # Tenta baixar a imagem. Se falhar, mostra o erro (-v)
          curl -v "http://localhost:3000/api?username=NerialSumber&show_icons=true&theme=radical&include_all_commits=true&count_private=true" -o github-stats.svg
          
          # Move para a raiz
          mv github-stats.svg ../github-stats.svg

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s github-stats.svg ]; then
            git add github-stats.svg
            git commit -m "docs: atualiza estatísticas de NerialSumber" || echo "Sem mudanças"
            git push
            echo "✅ Sucesso Total!"
          else
            echo "❌ Erro: O arquivo github-stats.svg está vazio ou não foi gerado."
            exit 1
          fi
